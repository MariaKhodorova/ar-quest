<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Финиш · AR Квест</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #0d1a0f;
      font-family: 'Nunito', sans-serif;
      color: #e8f5eb;
      padding: 24px 20px 40px;
      background-image: radial-gradient(ellipse 70% 40% at 50% 0%, #1a3a1e55 0%, transparent 60%);
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 20px 0 28px;
    }

    .trophy {
      font-size: 64px;
      display: block;
      animation: pop 0.5s ease;
      margin-bottom: 12px;
    }

    .hero h1 {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .hero .subtitle {
      font-size: 14px;
      color: #7fa888;
      line-height: 1.5;
    }

    .my-title {
      display: inline-block;
      margin-top: 14px;
      background: rgba(74,222,128,0.12);
      border: 1px solid rgba(74,222,128,0.35);
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 15px;
      font-weight: 800;
      color: #4ade80;
    }

    /* ── Stamps row ── */
    .stamps {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .stamp {
      font-size: 28px;
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.25);
      border-radius: 12px;
      padding: 10px;
      animation: pop 0.4s ease both;
      position: relative;
    }

    .stamp.locked {
      filter: grayscale(1);
      opacity: 0.3;
    }

    .stamp:nth-child(1) { animation-delay: .05s; }
    .stamp:nth-child(2) { animation-delay: .1s; }
    .stamp:nth-child(3) { animation-delay: .15s; }
    .stamp:nth-child(4) { animation-delay: .2s; }
    .stamp:nth-child(5) { animation-delay: .25s; }
    .stamp:nth-child(6) { animation-delay: .3s; }
    .stamp:nth-child(7) { animation-delay: .35s; }

    /* ── Section heading ── */
    .section-title {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #4ade80;
      opacity: 0.7;
      margin-bottom: 12px;
    }

    /* ── Leaderboard ── */
    .leaderboard { margin-bottom: 28px; }

    .lb-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #132016;
      border: 1px solid #1e3422;
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 8px;
      animation: slideIn 0.4s ease both;
    }

    .lb-item.me {
      border-color: rgba(74,222,128,0.45);
      background: rgba(74,222,128,0.07);
    }

    .lb-item.finished {
      border-color: rgba(250,204,21,0.4);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lb-medal { font-size: 24px; width: 32px; text-align: center; flex-shrink: 0; }

    .lb-info { flex: 1; min-width: 0; }

    .lb-name {
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lb-title {
      font-size: 12px;
      color: #7fa888;
      margin-top: 1px;
    }

    .lb-right { text-align: right; flex-shrink: 0; }

    .lb-score {
      font-size: 18px;
      font-weight: 900;
      color: #4ade80;
    }

    .lb-score span {
      font-size: 12px;
      color: #7fa888;
      font-weight: 400;
    }

    .lb-dots {
      display: flex;
      gap: 3px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .lb-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #1e3422;
    }

    .lb-dot.done { background: #4ade80; }

    /* ── Finishers banner ── */
    .finishers {
      background: linear-gradient(135deg, #132016, #1a2e1d);
      border: 1px solid rgba(250,204,21,0.3);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 28px;
      text-align: center;
    }

    .finishers h3 {
      font-size: 14px;
      font-weight: 800;
      color: #fbbf24;
      margin-bottom: 10px;
    }

    .finisher-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .chip {
      background: rgba(251,191,36,0.12);
      border: 1px solid rgba(251,191,36,0.3);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 700;
      color: #fbbf24;
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      color: #7fa888;
      font-size: 14px;
      padding: 20px 0;
    }

    .error-msg {
      text-align: center;
      color: #f87171;
      font-size: 13px;
      padding: 16px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px;
      margin-bottom: 20px;
    }

    /* ── Refresh button ── */
    .btn-refresh {
      display: block;
      width: 100%;
      background: transparent;
      border: 1px solid #1e3422;
      border-radius: 12px;
      padding: 13px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #7fa888;
      cursor: pointer;
      margin-top: 8px;
      transition: border-color 0.2s;
    }

    .btn-refresh:hover { border-color: #4ade80; color: #4ade80; }

    @keyframes pop {
      0%  { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <div class="hero">
    <span class="trophy" id="heroTrophy">🏆</span>
    <h1 id="heroTitle">Квест пройден!</h1>
    <p class="subtitle" id="heroSubtitle">Ты узнал секреты растений.<br>Отличная работа!</p>
    <div class="my-title" id="myTitle"></div>
  </div>

  <!-- Мои штампы -->
  <div style="margin-bottom:28px;">
    <div class="section-title">Мои штампы</div>
    <div class="stamps" id="myStamps"></div>
  </div>

  <!-- Финишеры -->
  <div class="finishers" id="finishersBlock" style="display:none;">
    <h3>🏅 Прошли все 7 станций</h3>
    <div class="finisher-chips" id="finishersList"></div>
  </div>

  <!-- Лидерборд -->
  <div class="leaderboard">
    <div class="section-title">Рейтинг группы</div>
    <div id="lbLoading" class="loading">Загружаем статистику…</div>
    <div id="lbError" class="error-msg" style="display:none;"></div>
    <div id="lbList"></div>
  </div>

  <button class="btn-refresh" onclick="loadStats()">🔄 Обновить статистику</button>

  <script>
    const STAMPS    = ['🌴','🌵','🌵','🌿','🌸','🦕','🌱'];
    const TITLES    = [
      { min: 0, max: 0, label: 'Юный исследователь 🌱' },
      { min: 1, max: 2, label: 'Юный ботаник 🌿' },
      { min: 3, max: 4, label: 'Знаток растений 🍃' },
      { min: 5, max: 6, label: 'Почти эксперт 🌳' },
      { min: 7, max: 7, label: 'Мастер-ботаник 🏆' },
    ];
    const MEDALS    = ['🥇','🥈','🥉'];

    const userId    = localStorage.getItem('quest_userId');
    const groupCode = localStorage.getItem('quest_groupCode');
    const userName  = localStorage.getItem('quest_name');
    const myDone    = JSON.parse(localStorage.getItem('quest_completed') || '[]');

    function getTitle(count) {
      return TITLES.slice().reverse().find(t => count >= t.min)?.label || TITLES[0].label;
    }

    // ── Hero setup ──────────────────────────────────────────────────────
    const myCount = myDone.length;

    if (myCount < 7) {
      document.getElementById('heroTrophy').textContent = myCount >= 4 ? '🌟' : '🌿';
      document.getElementById('heroTitle').textContent  = myCount === 0
        ? 'Квест начат!'
        : `Ты прошёл ${myCount} из 7!`;
      document.getElementById('heroSubtitle').textContent =
        myCount < 7 ? 'Найди оставшихся котиков, чтобы собрать все штампы!' : '';
    }

    document.getElementById('myTitle').textContent = getTitle(myCount);

    // ── Мои штампы ───────────────────────────────────────────────────────
    const stampsEl = document.getElementById('myStamps');
    STAMPS.forEach((emoji, i) => {
      const div = document.createElement('div');
      div.className = 'stamp' + (myDone.includes(i + 1) ? '' : ' locked');
      div.textContent = emoji;
      stampsEl.appendChild(div);
    });

    // ── Загрузка статистики ──────────────────────────────────────────────
    async function loadStats() {
      if (!groupCode) {
        document.getElementById('lbLoading').style.display = 'none';
        document.getElementById('lbError').style.display = 'block';
        document.getElementById('lbError').textContent =
          'Код группы не найден. Попробуйте войти заново.';
        return;
      }

      document.getElementById('lbLoading').style.display = 'block';
      document.getElementById('lbError').style.display   = 'none';
      document.getElementById('lbList').innerHTML        = '';

      try {
        const res  = await fetch(`/api/stats/${groupCode}`);
        const data = await res.json();

        document.getElementById('lbLoading').style.display = 'none';

        if (!data.participants || data.participants.length === 0) {
          document.getElementById('lbList').innerHTML =
            '<div class="loading">Пока никто не присоединился к группе.</div>';
          return;
        }

        // Сортировка: по количеству станций убыв
        const sorted = [...data.participants].sort(
          (a, b) => b.stationsCompleted - a.stationsCompleted
        );

        // Финишеры
        const finishers = sorted.filter(p => p.stationsCompleted >= 7);
        if (finishers.length > 0) {
          document.getElementById('finishersBlock').style.display = 'block';
          document.getElementById('finishersList').innerHTML =
            finishers.map(p =>
              `<div class="chip">🏆 ${escHtml(p.name)}</div>`
            ).join('');
        }

        // Лидерборд
        const lbEl = document.getElementById('lbList');
        sorted.forEach((p, idx) => {
          const isMe       = p.userId === userId;
          const isFinished = p.stationsCompleted >= 7;
          const medal      = idx < 3 ? MEDALS[idx] : `${idx + 1}`;
          const title      = getTitle(p.stationsCompleted);

          const dots = Array.from({ length: 7 }, (_, i) =>
            `<div class="lb-dot ${p.progress.includes(i + 1) ? 'done' : ''}"></div>`
          ).join('');

          const item = document.createElement('div');
          item.className = 'lb-item'
            + (isMe       ? ' me'       : '')
            + (isFinished ? ' finished' : '');
          item.style.animationDelay = `${idx * 0.07}s`;

          item.innerHTML = `
            <div class="lb-medal">${medal}</div>
            <div class="lb-info">
              <div class="lb-name">${escHtml(p.name)}${isMe ? ' 👈' : ''}</div>
              <div class="lb-title">${title}</div>
            </div>
            <div class="lb-right">
              <div class="lb-score">${p.stationsCompleted}<span>/7</span></div>
              <div class="lb-dots">${dots}</div>
            </div>
          `;
          lbEl.appendChild(item);
        });

      } catch (e) {
        document.getElementById('lbLoading').style.display = 'none';
        document.getElementById('lbError').style.display   = 'block';
        document.getElementById('lbError').textContent     =
          'Не удалось загрузить статистику. Проверьте соединение.';
      }
    }

    function escHtml(str) {
      return str.replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    loadStats();
  </script>
</body>
</html>
